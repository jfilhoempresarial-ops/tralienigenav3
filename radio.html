<div id="tela-radio" class="tela">
  <div class="tela-header">
    <button class="btn-voltar" onclick="APP.inicio()">← Voltar</button>
    <div class="tela-titulo">📻 Programa de Rádio</div>
  </div>
  <div class="tela-conteudo" style="padding:16px">
    <!-- Informações do Programa -->
    <div style="background: linear-gradient(135deg, #2d5016 0%, #4a7c2e 100%); border-radius: 12px; padding: 20px; margin-bottom: 20px; color: white; text-align: center;">
      <h2 style="margin: 0 0 10px 0; font-size: 18px;">📻 Próximo Programa</h2>
      <p style="margin: 5px 0; font-size: 16px; font-weight: bold;">Sábado, 26 de Abril</p>
      <p style="margin: 5px 0; font-size: 14px;">15h às 17h</p>
      <p style="margin: 5px 0; font-size: 14px;">Rádio Educadora 107,5 FM</p>
      <p style="margin: 10px 0 0 0; font-size: 12px; opacity: 0.9;">Sobral - Ceará</p>
    </div>

    <!-- Links de Transmissão -->
    <div style="margin-bottom: 20px;">
      <h3 style="font-size: 14px; font-weight: 700; margin: 0 0 10px 0; color: #1f2937;">Ouça o Programa</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <a href="https://www.facebook.com/radioeducadora" target="_blank" class="social-icon-btn" style="background:#1877f2;">📱</a>
        <a href="https://www.radiosnet.com.br" target="_blank" class="social-icon-btn" style="background:#ff6b35;">🎙️</a>
        <a href="https://www.youtube.com" target="_blank" class="social-icon-btn" style="background:#ff0000;">▶️</a>
      </div>
    </div>

    <!-- Abas de Interatividade -->
    <div style="margin-bottom: 20px;">
      <div style="display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px;">
        <button onclick="APP.mostrarAbaRadio('alo')" id="btn-alo" style="background: #2d8c3e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;">🎤 Peça seu Alô</button>
        <button onclick="APP.mostrarAbaRadio('musica')" id="btn-musica" style="background: #e5e7eb; color: #1f2937; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;">🎵 Peça sua Música</button>
        <button onclick="APP.mostrarAbaRadio('entrevista')" id="btn-entrevista" style="background: #e5e7eb; color: #1f2937; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;">🎙️ Seja Entrevistado</button>
      </div>

      <!-- Conteúdo das Abas -->
      <div id="aba-alo" style="display: block;">
        <h3 style="font-size: 14px; font-weight: 700; margin: 0 0 10px 0; color: #1f2937;">🎤 Peça seu Alô</h3>
        <input type="text" id="alo-nome" placeholder="Seu nome" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <input type="text" id="alo-cidade" placeholder="Sua cidade" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <textarea id="alo-msg" placeholder="Seu alô para o programa (máx. 200 caracteres)" maxlength="200" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; resize: vertical; min-height: 80px;"></textarea>
        <button onclick="APP.enviarFormularioRadio('alo')" style="width: 100%; background: #2d8c3e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;">📤 Enviar Alô</button>
        <div id="alo-historico" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #555;"></div>     </div>

      <div id="aba-musica" style="display: none;">
        <h3 style="font-size: 14px; font-weight: 700; margin: 0 0 10px 0; color: #1f2937;">🎵 Peça sua Música</h3>
        <input type="text" id="musica-nome" placeholder="Seu nome" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <input type="text" id="musica-titulo" placeholder="Nome da música" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <input type="text" id="musica-artista" placeholder="Artista" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <input type="text" id="musica-dedicacao" placeholder="Para quem você dedica?" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <button onclick="APP.enviarFormularioRadio('musica')" style="width: 100%; background: #2d8c3e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;">📤 Enviar Música</button>
        <div id="musica-historico" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #555;"></div>     </div>

      <div id="aba-entrevista" style="display: none;">
        <h3 style="font-size: 14px; font-weight: 700; margin: 0 0 10px 0; color: #1f2937;">🎙️ Participe como Entrevistado</h3>
        <input type="text" id="entrevista-nome" placeholder="Seu nome" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <input type="text" id="entrevista-wpp" placeholder="Seu WhatsApp" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        <textarea id="entrevista-tema" placeholder="Qual é seu tema ou história? (máx. 300 caracteres)" maxlength="300" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; resize: vertical; min-height: 100px;"></textarea>
        <button onclick="APP.enviarFormularioRadio('entrevista')" style="width: 100%; background: #2d8c3e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;">📤 Enviar Proposta</button>
        <div id="entrevista-historico" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #555;"></div>      </div>
    </div>


  </div>
</div>
